name: CI

on:
  push:
    branches:
      - main
      - dev

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: set up python 3.13.5
        uses: actions/setup-python@v5
        with:
          python-version: "3.13.5"
          
      - name: Check Python version
        run: python --version
